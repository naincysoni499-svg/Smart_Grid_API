version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Naincy
      POSTGRES_DB: smart_grid_db

    ports:
      - "5432:5432"

    volumes:
      - timescale_data:/var/lib/postgresql/data

volumes:
  timescale_data: